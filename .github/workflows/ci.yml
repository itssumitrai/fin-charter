name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run
      - name: Build
        run: npm run build
